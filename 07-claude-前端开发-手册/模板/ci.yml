# 前端 CI 流水线 —— 工具中立层,团队质量门的执行者。
# 放在 .github/workflows/ci.yml。对所有 PR 生效,无论作者用什么 AI 工具(第六册第4章)。
#
# 配合分支保护(Settings → Branches):require status checks、require review、不准直推 main。
# 这样任何人的 PR 不过这些检查都合不进去 —— 团队标准对所有人强制的地方。

name: CI
on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: 类型检查
        run: npm run typecheck
      - name: 单元/组件测试
        run: npm test
      - name: 构建
        run: npm run build
      # 可选:包体预算,防 AI 引入大依赖导致包膨胀
      # - name: 包体检查
      #   run: npx size-limit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: 装 Playwright 浏览器
        run: npx playwright install --with-deps
      - name: e2e 测试
        run: npm run e2e

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: 密钥扫描
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
